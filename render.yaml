services:
  - type: web
    name: doctor-discovery-tool
    runtime: python
    plan: free
    rootDir: doctor_discovery
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
